# ShellCrash 自定义规则（启动时自动插入最前）
# Zscaler: domains + IPs in one classical ruleset → 手动选择
- RULE-SET,Zscaler,手动选择,no-resolve
# Firstrade: CloudFront 主机走代理（ISP DIRECT 差）；官网 www 等走 DIRECT（家用 IP）
- DOMAIN,api3x.firstrade.com,手动选择
- DOMAIN,streamingx.firstrade.com,手动选择
- DOMAIN,invest.firstrade.com,手动选择
- DOMAIN-SUFFIX,firstrade.com,DIRECT
- DOMAIN-SUFFIX,firstrade.net,DIRECT
# Apple TV+ / Music / News only — not whole Apple/iCloud (keep those DIRECT via Apple group)
- RULE-SET,AppleMedia,手动选择
- DOMAIN-SUFFIX,linkedin.com,全球代理
- DOMAIN-SUFFIX,licdn.com,全球代理
- DOMAIN-SUFFIX,linkedin.cn,REJECT
- DOMAIN-SUFFIX,licdn.cn,REJECT
# Mail (SMTP + IMAP) → DIRECT (see ruleset/Mail.yaml)
- RULE-SET,Mail,DIRECT
# Rebrickable → url-test group (see ruleset/Rebrickable.yaml + rebrickable_nodes.txt)
- RULE-SET,Rebrickable,Rebrickable
# .jp + taigatakahashi.com → Japan url-test (see ruleset/Japan.yaml + japan_nodes.txt)
- RULE-SET,Japan,Japan
# AI: domains missing from/misrouted by subscription's own rule-providers (see ruleset/AI.yaml)
- RULE-SET,AI,Ai+
